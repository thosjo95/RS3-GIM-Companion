<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="shieldBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c1928"/>
      <stop offset="100%" stop-color="#0d0b14"/>
    </linearGradient>
    <linearGradient id="goldTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8ca6a"/>
      <stop offset="100%" stop-color="#a87c10"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f0d878"/>
      <stop offset="60%"  stop-color="#c8a84b"/>
      <stop offset="100%" stop-color="#9a7010"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M100 10 L184 38 L184 108 Q184 166 100 210 Q16 166 16 108 L16 38 Z"
        fill="url(#shieldBg)" stroke="url(#goldTop)" stroke-width="5.5" stroke-linejoin="round"/>

  <!-- Inner border ring (decorative) -->
  <path d="M100 24 L171 49 L171 110 Q171 157 100 196 Q29 157 29 110 L29 49 Z"
        fill="none" stroke="#c8a84b" stroke-width="1.2" stroke-opacity="0.35" stroke-linejoin="round"/>

  <!-- ── Iron helm ── -->
  <!-- Dome -->
  <path d="M68 92 Q68 54 100 54 Q132 54 132 92 Z"
        fill="url(#goldShine)" filter="url(#glow)"/>
  <!-- Helm body / cheek guards -->
  <rect x="60" y="90" width="80" height="40" rx="4"
        fill="url(#goldShine)"/>
  <!-- Visor slit left -->
  <rect x="66" y="98" width="27" height="7" rx="2.5"
        fill="#0a0812"/>
  <!-- Visor slit right -->
  <rect x="107" y="98" width="27" height="7" rx="2.5"
        fill="#0a0812"/>
  <!-- Central nasal bar -->
  <rect x="93" y="90" width="14" height="42" rx="3"
        fill="#0a0812"/>
  <!-- Chin / bottom plate edge (darker gold) -->
  <rect x="60" y="126" width="80" height="5" rx="2.5"
        fill="#8a6208" opacity="0.8"/>

  <!-- ── Group dots (3 members) ── -->
  <g filter="url(#glow)">
    <circle cx="72"  cy="152" r="10" fill="url(#goldTop)" stroke="#0a0812" stroke-width="1"/>
    <circle cx="100" cy="152" r="10" fill="url(#goldTop)" stroke="#0a0812" stroke-width="1"/>
    <circle cx="128" cy="152" r="10" fill="url(#goldTop)" stroke="#0a0812" stroke-width="1"/>
    <!-- Mini heads -->
    <circle cx="72"  cy="148" r="3.8" fill="#0a0812"/>
    <path d="M67 156 Q72 152 77 156" stroke="#0a0812" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="100" cy="148" r="3.8" fill="#0a0812"/>
    <path d="M95 156 Q100 152 105 156" stroke="#0a0812" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="128" cy="148" r="3.8" fill="#0a0812"/>
    <path d="M123 156 Q128 152 133 156" stroke="#0a0812" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── "GIM" label ── -->
  <text x="100" y="193"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="23" font-weight="bold" letter-spacing="5"
        fill="url(#goldTop)" text-anchor="middle"
        filter="url(#glow)">GIM</text>

  <!-- Thin rule under GIM text -->
  <line x1="54" y1="199" x2="146" y2="199"
        stroke="#c8a84b" stroke-width="1" stroke-opacity="0.5"/>
</svg>
